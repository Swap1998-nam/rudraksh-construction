{% extends "base.html" %}
{% block content %}

<section style="padding-top:140px;padding-bottom:80px;">
  <div class="wrap">
    <div style="max-width:760px;margin:0 auto;">
      <div class="hero-tag" style="margin-bottom:12px;">{{ post.created_at.strftime('%d %B %Y') }} · {{ post.author }}</div>
      <h1 style="font-size:clamp(36px,5vw,64px);margin-bottom:20px;">{{ post.title }}</h1>
      {% if post.excerpt %}
        <p style="font-size:18px;color:var(--steel);margin-bottom:40px;">{{ post.excerpt }}</p>
      {% endif %}
      <hr style="border:none;border-top:1px solid var(--line);margin-bottom:40px;">
      <div class="blog-content">
        {{ post.content | safe }}
      </div>
      <hr style="border:none;border-top:1px solid var(--line);margin:40px 0;">
      <a href="{{ url_for('blog.list') }}" class="btn btn-ghost">← Back to Blog</a>
    </div>
  </div>
</section>

<style>
.blog-content{font-size:17px;line-height:1.8;color:var(--ink);}
.blog-content h2,.blog-content h3{margin-top:32px;margin-bottom:16px;}
.blog-content p{margin-bottom:18px;color:var(--steel);}
.blog-content img{max-width:100%;border:1px solid var(--line);margin:24px 0;}
.blog-content blockquote{border-left:3px solid var(--brass);padding:16px 24px;margin:24px 0;background:var(--paper-dim);font-style:italic;}
.blog-content ul,.blog-content ol{padding-left:24px;margin-bottom:18px;color:var(--steel);}
.blog-content li{margin-bottom:8px;}
.blog-content a{color:var(--brass);text-decoration:underline;}
</style>
{% endblock %}

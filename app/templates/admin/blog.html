{% extends "admin/base.html" %}
{% block content %}
<div class="page-header">
  <h1>Blog Posts</h1>
  <a href="{{ url_for('admin.blog_new') }}" class="btn btn-primary">+ New Post</a>
</div>
<table class="admin-table">
  <thead>
    <tr><th>Title</th><th>Slug</th><th>Author</th><th>Published</th><th>Date</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for p in posts %}
    <tr>
      <td>{{ p.title }}</td>
      <td>{{ p.slug }}</td>
      <td>{{ p.author }}</td>
      <td>{% if p.published %}&#10003;{% else %}<span style="color:#999;">Draft</span>{% endif %}</td>
      <td>{{ p.created_at.strftime('%d-%m-%Y') }}</td>
      <td class="actions">
        <a href="{{ url_for('admin.blog_edit', id=p.id) }}" class="btn-sm">Edit</a>
        <form method="POST" action="{{ url_for('admin.blog_delete', id=p.id) }}" style="display:inline;">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="btn-sm danger" onclick="return confirm('Delete this post?')">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}

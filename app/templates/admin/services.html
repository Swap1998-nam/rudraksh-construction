{% extends "admin/base.html" %}
{% block content %}
<div class="page-header">
  <h1>Services</h1>
  <a href="{{ url_for('admin.service_new') }}" class="btn btn-primary">+ New Service</a>
</div>
<table class="admin-table">
  <thead>
    <tr><th>Title</th><th>Icon</th><th>Order</th><th>Active</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for s in services %}
    <tr>
      <td>{{ s.title }}</td>
      <td>{{ s.icon_name }}</td>
      <td>{{ s.order }}</td>
      <td>{% if s.active %}&#10003;{% endif %}</td>
      <td class="actions">
        <a href="{{ url_for('admin.service_edit', id=s.id) }}" class="btn-sm">Edit</a>
        <form method="POST" action="{{ url_for('admin.service_delete', id=s.id) }}" style="display:inline;">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="btn-sm danger" onclick="return confirm('Delete this service?')">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Rudraksh Construction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">RUDRAKSH <span>ADMIN</span></div>
    <nav class="sidebar-nav">
      <a href="{{ url_for('admin.dashboard') }}" class="{% if request.endpoint == 'admin.dashboard' %}active{% endif %}">Dashboard</a>
      <a href="{{ url_for('admin.projects') }}" class="{% if request.endpoint and request.endpoint.startswith('admin.project') %}active{% endif %}">Projects</a>
      <a href="{{ url_for('admin.services') }}" class="{% if request.endpoint and request.endpoint.startswith('admin.service') %}active{% endif %}">Services</a>
      <a href="{{ url_for('admin.team') }}" class="{% if request.endpoint and request.endpoint.startswith('admin.team') %}active{% endif %}">Team</a>
      <a href="{{ url_for('admin.blog') }}" class="{% if request.endpoint and request.endpoint.startswith('admin.blog') %}active{% endif %}">Blog</a>
      <a href="{{ url_for('admin.messages') }}" class="{% if request.endpoint and request.endpoint.startswith('admin.message') %}active{% endif %}">Messages</a>
      <a href="{{ url_for('admin.settings') }}" class="{% if request.endpoint == 'admin.settings' %}active{% endif %}">Settings</a>
      <a href="{{ url_for('main.index') }}" target="_blank">View Site</a>
      <a href="{{ url_for('admin.logout') }}">Logout</a>
    </nav>
  </aside>
  <main class="admin-main">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>

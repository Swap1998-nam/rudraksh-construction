{% extends "admin/base.html" %}
{% block content %}
<div class="page-header">
  <h1>Team Members</h1>
  <a href="{{ url_for('admin.team_new') }}" class="btn btn-primary">+ New Member</a>
</div>
<table class="admin-table">
  <thead>
    <tr><th>Name</th><th>Title</th><th>Lead</th><th>Order</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for m in members %}
    <tr>
      <td>{{ m.name }}</td>
      <td>{{ m.title }}</td>
      <td>{% if m.is_lead %}&#10003;{% endif %}</td>
      <td>{{ m.order }}</td>
      <td class="actions">
        <a href="{{ url_for('admin.team_edit', id=m.id) }}" class="btn-sm">Edit</a>
        <form method="POST" action="{{ url_for('admin.team_delete', id=m.id) }}" style="display:inline;">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="btn-sm danger" onclick="return confirm('Delete this member?')">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}

{% extends "admin/base.html" %}
{% block content %}
<div class="page-header">
  <h1>{% if service %}Edit Service{% else %}New Service{% endif %}</h1>
  <a href="{{ url_for('admin.services') }}" class="btn">Back</a>
</div>
<form method="POST" class="admin-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="field"><label>Title</label>{{ form.title }}</div>
  <div class="field"><label>Description</label>{{ form.description }}</div>
  <div class="field"><label>Icon</label>{{ form.icon_name }}</div>
  <div class="field"><label>Order</label>{{ form.order }}</div>
  <div class="field checkbox"><label>{{ form.active }} Active</label></div>
  <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}

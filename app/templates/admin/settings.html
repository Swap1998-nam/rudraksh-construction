{% extends "admin/base.html" %}
{% block content %}
<div class="page-header">
  <h1>Site Settings</h1>
</div>
<form method="POST" class="admin-form" style="max-width:600px;">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="field"><label>Site Name</label>{{ form.site_name }}</div>
  <div class="field"><label>Contact Email</label>{{ form.site_email }}</div>
  <div class="field"><label>Phone</label>{{ form.site_phone }}</div>
  <div class="field"><label>Address</label>{{ form.site_address }}</div>
  <div class="field"><label>Business Hours</label>{{ form.site_hours }}</div>
  <button type="submit" class="btn btn-primary">Save Settings</button>
</form>
{% endblock %}
